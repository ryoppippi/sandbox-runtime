name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  build-seccomp:
    name: Build seccomp (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1
      - run: sudo apt-get update && sudo apt-get install -y gcc libseccomp-dev
      - run: npm run build:seccomp
      - uses: actions/upload-artifact@v4
        with:
          name: seccomp-${{ matrix.arch }}
          path: vendor/seccomp/${{ matrix.arch }}
          if-no-files-found: error

  build-srt-win:
    name: Build srt-win (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: dtolnay/rust-toolchain@stable
      - run: npm run build:srt-win
      - name: Verify srt-win.exe runs
        shell: pwsh
        run: |
          $exe = "vendor/srt-win/${{ matrix.arch }}/srt-win.exe"
          if (-not (Test-Path $exe)) { throw "$exe not found" }
          & $exe --version
          if ($LASTEXITCODE -ne 0) { throw "srt-win.exe --version exited $LASTEXITCODE" }
      - uses: actions/upload-artifact@v4
        with:
          name: srt-win-${{ matrix.arch }}
          path: vendor/srt-win/${{ matrix.arch }}
          if-no-files-found: error

  verify-package:
    name: Verify package (Windows)
    needs: [build-seccomp, build-srt-win]
    runs-on: windows-latest
    env:
      # Husky's prepare hook chokes on Windows runners; skip it.
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/download-artifact@v4
        with:
          name: srt-win-x64
          path: vendor/srt-win/x64
      - uses: actions/download-artifact@v4
        with:
          name: srt-win-arm64
          path: vendor/srt-win/arm64
      - uses: actions/download-artifact@v4
        with:
          name: seccomp-x64
          path: vendor/seccomp/x64
      - uses: actions/download-artifact@v4
        with:
          name: seccomp-arm64
          path: vendor/seccomp/arm64
      - run: npm ci
      - run: npm run build
      - name: Pack, install into clean dir, resolve+run srt-win.exe
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          npm pack
          $pkg = (Get-ChildItem *.tgz).FullName
          $tmp = Join-Path $env:RUNNER_TEMP "pkg-verify"
          New-Item -ItemType Directory -Force $tmp | Out-Null
          Push-Location $tmp
          npm init -y | Out-Null
          npm install $pkg
          # Package is ESM-only ("type":"module"); use dynamic import().
          # End-to-end: getSrtWinPath() from the installed package resolves
          # vendor/srt-win/<arch>/srt-win.exe under node_modules and runs it.
          Set-Content -Path verify.cjs -Value @"
          const { spawnSync } = require('child_process');
          import('@anthropic-ai/sandbox-runtime').then(m => {
            const p = m.getSrtWinPath();
            console.log('resolved:', p);
            const r = spawnSync(p, ['--version'], { encoding: 'utf8' });
            console.log((r.stdout || '') + (r.stderr || ''));
            if (r.status !== 0) throw new Error('exit ' + r.status + ': ' + r.stderr);
          }).catch(e => { console.error(e); process.exit(1); });
          "@
          node verify.cjs
          Pop-Location

  publish:
    name: Publish to npm
    needs: [build-seccomp, build-srt-win, verify-package]
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Release tag points to a commit not on main. Refusing to publish unreviewed code."
            exit 1
          fi

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) doesn't match package.json ($PKG_VERSION)"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - uses: actions/download-artifact@v4
        with:
          name: seccomp-x64
          path: vendor/seccomp/x64
      - uses: actions/download-artifact@v4
        with:
          name: seccomp-arm64
          path: vendor/seccomp/arm64
      - run: chmod +x vendor/seccomp/*/apply-seccomp

      - uses: actions/download-artifact@v4
        with:
          name: srt-win-x64
          path: vendor/srt-win/x64
      - uses: actions/download-artifact@v4
        with:
          name: srt-win-arm64
          path: vendor/srt-win/arm64

      - run: npm install
      - run: npm run clean && npm run build

      - name: Verify package contents
        run: |
          npm pack
          PKG=$(ls *.tgz)
          echo "::group::tarball contents"
          tar -tzf "$PKG" | sort
          echo "::endgroup::"
          for f in vendor/srt-win/x64/srt-win.exe vendor/srt-win/arm64/srt-win.exe vendor/seccomp/x64/apply-seccomp vendor/seccomp/arm64/apply-seccomp; do
            tar -tzf "$PKG" | grep -q "package/$f$" || { echo "::error::missing $f in tarball"; exit 1; }
          done
          if tar -tzf "$PKG" | grep -qE 'package/vendor/(srt-win-src|seccomp-src)/'; then
            echo "::error::source dirs leaked into tarball"; exit 1
          fi
          rm "$PKG"

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
